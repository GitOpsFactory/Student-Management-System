name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Student Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/student:v2 ./student-service
        docker push ${{ secrets.DOCKER_USERNAME }}/student:v2

    - name: Build Course Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/course:v2 ./course-service
        docker push ${{ secrets.DOCKER_USERNAME }}/course:v2

    - name: Build Result Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/result:v2 ./result-service
        docker push ${{ secrets.DOCKER_USERNAME }}/result:v2

   
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/student-service.yaml
        kubectl apply -f k8s/postgres.yaml
        kubectl apply -f k8s/course-service.yaml
        kubectl apply -f k8s/result-service.yaml
        kubectl apply -f k8s/ingress.yaml

    - name: Wait for Rollout
      run: |
        kubectl rollout status deployment/student
        kubectl rollout status deployment/course
        kubectl rollout status deployment/result

    - name: Verify Deployment
      run: |
        kubectl get pods
        kubectl get svc
        kubectl get ingress